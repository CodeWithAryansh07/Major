name: code_craft_mobile
description: "Flutter mobile app for CodeCraft - Interactive Code Editor"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.2
  
  # Navigation
  go_router: ^14.5.3
  
  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Code Editor
  flutter_highlight: ^0.7.0
  flutter_code_editor: ^0.3.3
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  
  # Animation
  lottie: ^3.1.3
  
  # Authentication (if using Clerk/similar)
  # clerk_flutter: ^1.0.0 # This would be added when available

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/language-logos/
    
  fonts:
    - family: GeistSans
      fonts:
        - asset: assets/fonts/GeistVF.woff2
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMonoVF.woff2
